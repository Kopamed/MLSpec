name: ml-experiment
version: 1
description: ML experimentation workflow - baselines, experiments, candidates, and evidence

artifacts:
  - id: evaluation
    generates: evaluation.md
    description: MLSpec workspace evaluation document
    template: evaluation.md
    instruction: |
      The evaluation document provides an overview of the ML experimentation workspace.
      It should contain:
      - Workspace purpose and scope
      - Key baselines and their purpose
      - Active experiments and their status
      - Notable findings and recommendations

      This is the entry point for understanding the MLSpec workspace.
    requires: []

  - id: hypothesis
    generates: "experiments/*/hypothesis.md"
    description: Experiment hypothesis document
    template: hypothesis.md
    instruction: |
      The hypothesis document defines what the experiment is testing.
      It should contain:
      - The hypothesis being tested
      - What success looks like
      - Key metrics to evaluate
      - Risks and concerns

      This is created automatically when a new experiment is initialized.
    requires: []

  - id: evidence
    generates: "experiments/*/evidence/*.md"
    description: Evidence files at different evaluation levels
    template: evidence.md
    instruction: |
      Evidence files document results at specific evaluation levels (E1-E5).
      Each evidence file should contain:
      - YAML frontmatter with evidence_level, recommendation, comparison_ref, metrics, compute
      - Description of what was done
      - Results and observations
      - Interpretation of the results

      Evidence levels:
      - E1: Cheap proxy / smoke test
      - E2: Controlled small experiment
      - E3: Medium-scale validation
      - E4: Full cross-validation
      - E5: Final production validation
    requires:
      - hypothesis

  - id: decision
    generates: "experiments/*/decision.md"
    description: Experiment decision document
    template: decision.md
    instruction: |
      The decision document records the final outcome of an experiment.
      It should contain:
      - The decision (promote, reject, inconclusive, hold, retry)
      - Rationale for the decision
      - Supporting evidence references
      - Next steps

      This is created when an experiment reaches a conclusion.
    requires:
      - evidence

  - id: baseline
    generates: "baselines/*/.baseline.yaml"
    description: Baseline entity metadata
    template: baseline.md
    instruction: |
      A baseline is a reference point for comparison. Baselines are never rejected,
      but can be superseded by newer baselines.

      Baseline metadata should include:
      - entity_type: baseline
      - created: creation date
      - superseded_by: reference to newer baseline (optional)
    requires: []

  - id: recipe
    generates: "candidates/*/.candidate.yaml"
    description: Candidate recipe with version history
    template: recipe.md
    instruction: |
      A candidate is a versioned ML recipe that can be promoted through experiments.

      Candidate metadata should include:
      - entity_type: candidate
      - name: candidate name
      - current_version: current working version
      - latest_finalized_version: highest finalized version (optional)
      - versions[]: array of version records

      Versions have:
      - version: version number
      - file: path to recipe file
      - status: draft | finalized
      - supporting_experiments: references to experiments that led to this version
    requires: []

  - id: finding
    generates: "findings/*.md"
    description: Knowledge base findings
    template: finding.md
    instruction: |
      Findings are manually maintained knowledge about what works and what doesn't.
      They should contain:
      - What works (with experiment references)
      - What doesn't work (with experiment references)
      - Context and caveats
      - Confidence level

      Findings are NOT auto-generated. They represent synthesized knowledge.
    requires: []

apply:
  requires: []
  tracks: null
  instruction: |
    MLSpec commands are implemented as 'openspec ml <command>'.
    Use 'openspec ml --help' to see available commands.
